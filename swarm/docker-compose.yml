version: '3.8'

services:
  # Matrix Server (Conduit)
  conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: matrixswarm-conduit
    restart: unless-stopped
    ports:
      - "${CONDUIT_PORT:-8448}:8448"
    volumes:
      - conduit-data:/var/lib/matrix-conduit
      - ./config/conduit.toml:/etc/matrix-conduit/conduit.toml:ro
    environment:
      - RUST_LOG=info
    networks:
      - matrixswarm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8448/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Task Queue Manager
  task-queue:
    build: .
    container_name: matrixswarm-tasks
    restart: unless-stopped
    ports:
      - "${TASK_PORT:-5000}:5000"
    volumes:
      - task-data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///data/tasks.db
    depends_on:
      - conduit
    networks:
      - matrixswarm

  # Web Interface (Optional)
  web-ui:
    image: nginx:alpine
    container_name: matrixswarm-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - task-queue
    networks:
      - matrixswarm

  # Monitoring (Optional)
  monitoring:
    image: louislam/uptime-kuma:1
    container_name: matrixswarm-monitor
    restart: unless-stopped
    ports:
      - "${MONITOR_PORT:-3001}:3001"
    volumes:
      - kuma-data:/app/data
    networks:
      - matrixswarm

volumes:
  conduit-data:
  task-data:
  kuma-data:

networks:
  matrixswarm:
    driver: bridge