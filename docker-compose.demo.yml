version: '3.8'

services:
  node1:
    image: node:20-alpine
    command: sh -c "npm install -g tsx typescript && npm install && npm run demo:node1"
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ROLE=Magistrate
      - DEMO_MODE=true

  node2:
    image: node:20-alpine
    command: sh -c "npm install -g tsx typescript && npm install && npm run demo:node2"
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - NODE_ROLE=Scout
      - DEMO_MODE=true
    depends_on:
      - node1
